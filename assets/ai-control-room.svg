<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="0.35" stop-color="#1e1b4b"/>
      <stop offset="0.68" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 178) rotate(90) scale(116)">
      <stop stop-color="#f5f3ff"/>
      <stop offset="0.35" stop-color="#a78bfa"/>
      <stop offset="0.75" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.55 0 0 0 0 0.35 0 0 0 0 1 0 0 0 1 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#a78bfa" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
    <style>
      .scan { animation: scan 5s linear infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: 600px 180px; }
      .orbit-a { animation: spin 9s linear infinite; transform-origin: 600px 180px; }
      .orbit-b { animation: spinReverse 13s linear infinite; transform-origin: 600px 180px; }
      .orbit-c { animation: spin 18s linear infinite; transform-origin: 600px 180px; }
      .node { animation: blink 2.8s ease-in-out infinite; }
      .node:nth-of-type(2n) { animation-delay: .5s; }
      .node:nth-of-type(3n) { animation-delay: 1s; }
      .title { font: 800 44px 'Segoe UI', Arial, sans-serif; letter-spacing: 6px; }
      .sub { font: 600 18px 'Segoe UI', Arial, sans-serif; letter-spacing: 3px; }
      .mono { font: 600 14px 'Consolas', 'Courier New', monospace; letter-spacing: 1px; }
      @keyframes scan { 0% { transform: translateX(-1200px); opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { transform: translateX(1200px); opacity: 0; } }
      @keyframes pulse { 0%,100% { transform: scale(.94); opacity: .65; } 50% { transform: scale(1.06); opacity: 1; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spinReverse { to { transform: rotate(-360deg); } }
      @keyframes blink { 0%,100% { opacity: .35; r: 3; } 50% { opacity: 1; r: 6; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="26" fill="url(#grid)"/>
  <rect class="scan" x="0" y="0" width="240" height="360" fill="url(#beam)" opacity="0.65"/>

  <g opacity="0.45">
    <path d="M110 72H310L390 152H515" stroke="#93c5fd" stroke-width="2"/>
    <path d="M1090 288H890L810 208H685" stroke="#c084fc" stroke-width="2"/>
    <path d="M82 255H275L360 184H510" stroke="#818cf8" stroke-width="2"/>
    <path d="M1118 105H925L840 176H690" stroke="#38bdf8" stroke-width="2"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="600" cy="180" r="118" fill="url(#core)" class="pulse"/>
    <g class="orbit-a">
      <ellipse cx="600" cy="180" rx="226" ry="54" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.85"/>
      <circle cx="826" cy="180" r="7" fill="#f5f3ff"/>
    </g>
    <g class="orbit-b">
      <ellipse cx="600" cy="180" rx="74" ry="220" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.8"/>
      <circle cx="600" cy="-40" r="7" fill="#bfdbfe"/>
    </g>
    <g class="orbit-c">
      <ellipse cx="600" cy="180" rx="172" ry="92" stroke="#6366f1" stroke-width="2" stroke-opacity="0.8" transform="rotate(-28 600 180)"/>
      <circle cx="772" cy="180" r="6" fill="#ddd6fe"/>
    </g>
  </g>

  <g fill="#e0e7ff">
    <circle class="node" cx="110" cy="72" r="4"/>
    <circle class="node" cx="310" cy="72" r="4"/>
    <circle class="node" cx="390" cy="152" r="4"/>
    <circle class="node" cx="1090" cy="288" r="4"/>
    <circle class="node" cx="890" cy="288" r="4"/>
    <circle class="node" cx="810" cy="208" r="4"/>
    <circle class="node" cx="82" cy="255" r="4"/>
    <circle class="node" cx="275" cy="255" r="4"/>
    <circle class="node" cx="1118" cy="105" r="4"/>
    <circle class="node" cx="925" cy="105" r="4"/>
  </g>

  <text x="600" y="166" text-anchor="middle" fill="#ffffff" class="title">AI BUILDER LAB</text>
  <text x="600" y="205" text-anchor="middle" fill="#ddd6fe" class="sub">HYDERABAD BASED | SHIPPING PROJECTS | LEARNING IN PUBLIC</text>
  <text x="600" y="243" text-anchor="middle" fill="#bfdbfe" class="mono">ANSHUL-REAL :: RAG :: FULL STACK :: SECURITY :: DEVELOPER TOOLS</text>

  <rect x="42" y="302" width="270" height="30" rx="15" fill="#09090b" fill-opacity="0.55" stroke="#a78bfa" stroke-opacity="0.45"/>
  <text x="177" y="322" text-anchor="middle" fill="#ddd6fe" class="mono">STATUS: BUILD MODE ACTIVE</text>

  <rect x="888" y="302" width="270" height="30" rx="15" fill="#09090b" fill-opacity="0.55" stroke="#60a5fa" stroke-opacity="0.45"/>
  <text x="1023" y="322" text-anchor="middle" fill="#bfdbfe" class="mono">LOCATION: HYDERABAD</text>
</svg>
